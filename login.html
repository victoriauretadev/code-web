<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CO:DE Developer - Iniciar Sesión" />
    <title>CO:DE Developer | Login</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <!-- ===== HEADER ===== -->
    <header class="header">
      <div class="header__container">
        <div class="logo">
          <a href="index.html" class="logo__link" aria-label="CO:DE Developer">
            <img
              src="./assets/img/logotipo/logotipo-code-horizonta-sin-fondo.png"
              alt="CO:DE Logo"
              class="logo__img"
            />
          </a>
        </div>

        <input type="checkbox" id="hamburger-toggle" class="hamburger-toggle" />

        <label for="hamburger-toggle" class="hamburger">
          <span class="hamburger__line"></span>
          <span class="hamburger__line"></span>
          <span class="hamburger__line"></span>
        </label>

        <nav class="navbar">
          <ul class="nav-menu">
            <li class="nav-menu__item">
              <a href="index.html#inicio" class="nav-menu__link">Inicio</a>
            </li>
            <li class="nav-menu__item">
              <a href="index.html#quienes-somos" class="nav-menu__link">Quienes Somos</a>
            </li>
            <li class="nav-menu__item">
              <a href="index.html#soluciones" class="nav-menu__link">Soluciones</a>
            </li>
            <li class="nav-menu__item">
              <a href="index.html#contacto" class="nav-menu__link">Contacto</a>
            </li>
          </ul>

          <div class="auth-buttons-mobile">
            <a href="./register.html" class="btn btn--register">Register</a>
          </div>
        </nav>

        <div class="auth-buttons">
          <a href="./register.html" class="btn btn--register">Register</a>
        </div>
      </div>
    </header>

    <main>
        <!-- ===== AUTH SECTION ===== -->

        <section class="auth-section">
            <div class="container">
          <div class="auth-section__wrapper">
            <!-- Columna Izquierda - Contenido -->
            <div class="auth-section__content">
              <h1 class="auth-section__title">
                Bienvenido a <span class="text-primary">CO:DE</span>
              </h1>
              <p class="auth-section__subtitle">
                Accede a tu cuenta para gestionar tus proyectos web y tiendas online. 
                Si aún no tienes cuenta, puedes registrarte de forma rápida y sencilla.
              </p>

              <a href="./register.html" class="btn btn--primary">
                Crear Nueva Cuenta
              </a>
            </div>
        </section>
    </main>
  </body>
</html>
